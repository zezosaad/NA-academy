name: na_app
description: "NA-Academy student mobile app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3
  flutter: ">=3.24.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  lucide_icons_flutter: ^3.1.13
  flutter_svg: ^2.2.4
  animate_do: ^5.1.0

  go_router: ^14.0.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  dio: ^5.0.0
  socket_io_client: ^2.0.0

  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3

  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  video_player: ^2.9.2
  chewie: ^1.8.5

  app_links: ^6.3.3
  device_info_plus: ^10.1.2
  logger: ^2.5.0
  url_launcher: ^6.3.0
  intl: ^0.20.2
  easy_localization: ^3.0.7

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  cryptography: ^2.7.0
  connectivity_plus: ^6.0.5

  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4
  flutter_local_notifications: ^18.0.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.jpeg

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
