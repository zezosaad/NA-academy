# Host nginx — TLS in front of docker-compose `admin` (which proxies `/api/` to backend).
#
# 1) Ensure `map … $connection_upgrade` is loaded once — see http-snippet-map.conf
# 2) sudo ln -sf /var/opt/NA-academy/deploy/nginx/host-naacademy.tech.conf \
#      /etc/nginx/sites-available/naacademy.tech
#    sudo ln -sf /etc/nginx/sites-available/naacademy.tech /etc/nginx/sites-enabled/
# 3) Fill TEAM_ID + signing cert SHA256 under ../well-known/
# 4) sudo certbot certonly --nginx -d naacademy.tech -d www.naacademy.tech
# 5) sudo nginx -t && sudo systemctl reload nginx

upstream na_admin_upstream {
    # Docker: `${ADMIN_PORT}:8080`. Host nginx owns :80/:443 — use ADMIN_PORT=8080 (see repo `.env`).
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name naacademy.tech www.naacademy.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://naacademy.tech$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.naacademy.tech;

    ssl_certificate     /etc/letsencrypt/live/naacademy.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naacademy.tech/privkey.pem;

    return 301 https://naacademy.tech$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name naacademy.tech;

    ssl_certificate     /etc/letsencrypt/live/naacademy.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/naacademy.tech/privkey.pem;

    client_max_body_size 2100m;

    # Universal links / App Links — must not fall through to SPA.
    location /.well-known/ {
        alias /var/opt/NA-academy/deploy/well-known/;
        types {
            application/json json;
        }
        default_type application/json;
    }

    location / {
        proxy_pass http://na_admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1d;
        proxy_send_timeout 1d;
    }
}
